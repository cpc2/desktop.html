name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build .\desktop-html.sln --nologo -c Release

      - name: Test
        run: dotnet test .\desktop-html.sln --nologo --no-build -c Release
